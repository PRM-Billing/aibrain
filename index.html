<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Operating Platform — Interactive Deck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #070d18; --surface: #0f172a; --s2: #1e293b; --s3: #334155;
      --text: #f8fafc; --muted: #94a3b8; --line: rgba(148,163,184,.12);
      --accent: #6366f1; --accent2: #a5b4fc;
      --glass: rgba(15,23,42,.72);
      --c-ceo:#a78bfa; --c-finance:#34d399; --c-ops:#fb923c; --c-hr:#fb7185;
      --c-pipeline:#60a5fa; --c-kb:#2dd4bf; --c-repo:#38bdf8;
      --c-chat:#c084fc; --c-backlog:#94a3b8;
    }
    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 15% -10%, rgba(99,102,241,.18), transparent 55%),
        radial-gradient(ellipse 60% 40% at 90% 100%, rgba(56,189,248,.1), transparent 50%),
        linear-gradient(rgba(148,163,184,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148,163,184,.03) 1px, transparent 1px);
      background-size: auto, auto, 48px 48px, 48px 48px;
    }
    .deck { display: flex; flex-direction: column; height: 100dvh; position: relative; z-index: 1; }
    .icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .icon svg { width: 100%; height: 100%; stroke-width: 2; }

    /* Progress rail */
    .progress-rail { display: flex; align-items: center; gap: 6px; padding: 10px 28px; background: var(--glass); backdrop-filter: blur(16px); border-bottom: 1px solid var(--line); overflow-x: auto; flex-shrink: 0; }
    .progress-rail::-webkit-scrollbar { display: none; }
    .p-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--s3); cursor: pointer; flex-shrink: 0; transition: all .3s cubic-bezier(.4,0,.2,1); }
    .p-dot.active { background: linear-gradient(135deg,var(--accent),#818cf8); width: 32px; border-radius: 6px; box-shadow: 0 0 12px rgba(99,102,241,.45); }
    .p-sep { width: 8px; height: 1px; background: var(--s3); flex-shrink: 0; opacity: .5; }

    /* Stage */
    .stage { flex: 1; position: relative; overflow: hidden; min-height: 0; }
    .slide { position: absolute; inset: 0; padding: 10px 24px 8px; opacity: 0; transform: translateX(36px); pointer-events: none; transition: opacity .35s ease, transform .35s ease; overflow: hidden; display: flex; flex-direction: column; gap: 0; }
    .slide::-webkit-scrollbar { width: 4px; }
    .slide::-webkit-scrollbar-thumb { background: var(--s3); border-radius: 2px; }
    .slide.active { opacity: 1; transform: translateX(0); pointer-events: auto; }

    /* Controls */
    .controls { display: flex; align-items: center; gap: 8px; padding: 10px 28px; background: var(--glass); backdrop-filter: blur(16px); border-top: 1px solid var(--line); flex-shrink: 0; }
    .counter { font-size: 13px; color: var(--muted); flex: 1; text-align: center; font-variant-numeric: tabular-nums; }
    .btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 16px; border-radius: 12px; border: 1px solid var(--s3); background: var(--s2); color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; white-space: nowrap; }
    .btn:hover { background: var(--s3); border-color: #475569; transform: translateY(-1px); }
    .btn.primary { background: linear-gradient(135deg,#6366f1,#4f46e5); border-color: transparent; color: white; box-shadow: 0 4px 14px rgba(99,102,241,.35); }
    .btn.primary:hover { background: linear-gradient(135deg,#4f46e5,#4338ca); }
    .btn.playing { background: #065f46; border-color: #059669; color: #d1fae5; }

    /* Typography */
    .slide-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; flex-shrink: 0; }
    .slide-header-left { flex: 1; min-width: 0; }
    .eyebrow { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--accent2); margin-bottom: 2px; padding: 3px 8px; border-radius: 999px; background: rgba(99,102,241,.12); border: 1px solid rgba(99,102,241,.2); }
    .slide-h1 { font-size: clamp(18px, 2.4vw, 28px); font-weight: 800; line-height: 1.15; margin-bottom: 0; letter-spacing: -.025em; }
    .slide-sub { font-size: 12px; color: var(--muted); margin-bottom: 8px; line-height: 1.45; max-width: 900px; flex-shrink: 0; }
    .slide-body { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    .narrative-card {
      display: grid; grid-template-columns: auto 1fr; gap: 10px; align-items: start;
      padding: 10px 12px; margin-bottom: 8px; border-radius: 14px;
      background: linear-gradient(135deg, rgba(99,102,241,.12), rgba(15,23,42,.62));
      border: 1px solid rgba(129,140,248,.24); flex-shrink: 0;
    }
    .narrative-ico {
      width: 30px; height: 30px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
      background: rgba(129,140,248,.16); color: var(--accent2);
    }
    .narrative-ico .icon { width: 15px; height: 15px; }
    .narrative-title { font-size: 10px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: var(--accent2); margin-bottom: 5px; }
    .narrative-points { display: flex; flex-wrap: wrap; gap: 6px; }
    .narrative-point {
      display: inline-flex; align-items: center; gap: 5px; padding: 5px 8px; border-radius: 999px;
      background: rgba(30,41,59,.68); border: 1px solid var(--line); color: var(--text);
      font-size: 10px; line-height: 1.25; font-weight: 600;
    }
    .narrative-point .icon { width: 11px; height: 11px; color: #34d399; flex-shrink: 0; }

    /* Grid */
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .g3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .fill { flex: 1; min-height: 0; }

    /* Cards */
    .card { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--line); border-radius: 16px; padding: 16px; transition: border-color .2s, transform .2s; }
    .card:hover { border-color: rgba(148,163,184,.22); }
    .card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .card-icon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card-icon .icon { width: 18px; height: 18px; }
    .card h3 { font-size: 14px; font-weight: 700; margin-bottom: 0; }
    .card p { font-size: 12px; color: var(--muted); line-height: 1.5; }

    /* Stats */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; width: 100%; max-width: 720px; }
    .stat-chip { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--line); border-radius: 16px; padding: 16px 14px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .stat-chip .stat-ico { width: 36px; height: 36px; border-radius: 10px; background: rgba(99,102,241,.15); display: flex; align-items: center; justify-content: center; color: var(--accent2); }
    .stat-chip .stat-ico .icon { width: 18px; height: 18px; }
    .stat-chip .n { font-size: 32px; font-weight: 800; background: linear-gradient(135deg,var(--accent),#c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: block; line-height: 1; }
    .stat-chip .l { font-size: 11px; color: var(--muted); font-weight: 500; }

    /* Brain chips */
    .brain-chips-row { display: flex; gap: 4px; margin-bottom: 8px; flex-shrink: 0; flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; }
    .brain-chips-row::-webkit-scrollbar { display: none; }
    .brain-chip { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 5px 3px; border-radius: 10px; border: 1px solid var(--line); font-size: 8px; font-weight: 600; cursor: pointer; transition: all .2s; background: var(--s2); color: var(--muted); text-align: center; line-height: 1.15; min-height: 46px; }
    .brain-chip:hover { border-color: rgba(148,163,184,.3); color: var(--text); transform: translateY(-1px); }
    .brain-chip .chip-ico { width: 26px; height: 26px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: rgba(255,255,255,.06); }
    .brain-chip .chip-ico .icon { width: 13px; height: 13px; }
    .brain-chip .chip-label { display: block; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 2px; }
    .brain-chip.active { color: #0f172a; box-shadow: 0 4px 14px rgba(0,0,0,.28); }
    .brain-chip.active .chip-ico { background: rgba(0,0,0,.14); }

    /* Tool chips */
    .tool-chips-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 6px; }
    .t-chip { display: inline-flex; align-items: center; gap: 5px; background: var(--s2); color: var(--muted); border: 1px solid var(--line); border-radius: 10px; padding: 6px 10px; font-size: 10px; font-weight: 600; }
    .t-chip .icon { width: 12px; height: 12px; opacity: .7; }

    /* Diagrams */
    .diagram { background: var(--glass); backdrop-filter: blur(8px); border: 1px solid var(--line); border-radius: 16px; padding: 12px; overflow: hidden; height: 100%; display: flex; flex-direction: column; min-height: 0; }
    .diagram .mermaid-host,
    .diagram .mermaid-wrap { display: flex; justify-content: center; align-items: center; width: 100%; flex: 1; min-height: 60px; overflow: hidden; }
    .diagram .mermaid-host .mermaid,
    .diagram .mermaid-wrap .mermaid { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; flex: 1; min-height: 60px; }
    .diagram .mermaid-host svg,
    .diagram .mermaid-wrap svg { max-width: 100%; width: 100%; height: 100%; display: block; margin: 0 auto; }
    .diagram-head { display: flex; align-items: center; gap: 8px; font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; flex-shrink: 0; padding-bottom: 8px; border-bottom: 1px solid var(--line); }
    .diagram-head .icon { width: 13px; height: 13px; }
    .diagram.spotlight-diagram { padding: 12px 14px; min-height: 0; }

    /* Spotlight layout */
    .spotlight-shell { display: flex; flex-direction: column; flex: 1; min-height: 0; }
    .spotlight-top { margin-bottom: 6px; flex-shrink: 0; }
    .spotlight-top .slide-h1 { font-size: clamp(17px, 2vw, 24px); }
    .spotlight-body { display: grid; grid-template-columns: 184px minmax(280px, 32%) 1fr; gap: 10px; flex: 1; min-height: 0; align-items: stretch; }
    .spotlight-brain-tabs .v-tab-sub { max-width: 120px; }
    .spotlight-aside { display: flex; flex-direction: column; gap: 6px; min-height: 0; height: 100%; }
    .spotlight-aside .example-hero { flex-shrink: 0; }
    .spotlight-aside .outcome-card { flex-shrink: 0; }
    .spotlight-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; flex-shrink: 0; }
    .spotlight-info-card {
      background: var(--glass); border: 1px solid var(--line); border-radius: 12px; padding: 10px 11px;
      display: flex; align-items: flex-start; gap: 8px; min-height: 74px;
    }
    .spotlight-info-card .icon { width: 13px; height: 13px; color: var(--brain-color, var(--accent2)); flex-shrink: 0; margin-top: 2px; }
    .spotlight-info-card strong { display: block; font-size: 10px; color: var(--text); margin-bottom: 4px; letter-spacing: .06em; text-transform: uppercase; }
    .spotlight-info-card span:last-child { display: block; font-size: 10px; line-height: 1.35; color: var(--muted); }
    .spotlight-narrative {
      background: var(--glass); border: 1px solid var(--line); border-radius: 12px; padding: 11px 12px;
      font-size: 11px; line-height: 1.45; color: var(--muted); flex-shrink: 0;
    }
    .spotlight-narrative strong { display: block; color: var(--brain-color, var(--accent2)); font-size: 11px; margin-bottom: 4px; }

    /* Horizontal viz track — agent mini-pipeline */
    .viz-h-track { flex: 1; display: flex; align-items: center; gap: 0; min-height: 0; padding: 8px 0; }
    .viz-h-step { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; min-width: 0; padding: 0 4px; }
    .viz-h-ico { width: 40px; height: 40px; border-radius: 11px; background: var(--s2); border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; color: var(--accent2); }
    .viz-h-ico .icon { width: 18px; height: 18px; }
    .viz-h-label { font-size: 11px; font-weight: 700; line-height: 1.2; }
    .viz-h-desc { font-size: 9px; color: var(--muted); line-height: 1.3; max-width: 100px; }
    .g2.fill > .diagram { flex: 1; min-height: 0; height: 100%; }
    .viz-h-sep { flex: 0 0 20px; display: flex; align-items: center; justify-content: center; color: var(--s3); margin-bottom: 28px; }
    .viz-h-sep .icon { width: 12px; height: 12px; }

    /* Example block */
    .example-hero { border-radius: 14px; padding: 12px; background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--line); flex-shrink: 0; position: relative; overflow: hidden; }
    .example-hero .q { font-size: 13px; font-weight: 700; line-height: 1.4; margin-bottom: 0; display: flex; gap: 8px; align-items: flex-start; }
    .example-hero .q .icon { width: 16px; height: 16px; margin-top: 1px; opacity: .85; flex-shrink: 0; }
    .outcome-card { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; font-weight: 600; line-height: 1.45; padding: 10px 12px; border-radius: 12px; background: var(--glass); border: 1px solid var(--line); flex-shrink: 0; }
    .outcome-card .icon { width: 15px; height: 15px; flex-shrink: 0; margin-top: 1px; }

    /* Flow steps — used elsewhere */
    .flow-steps { display: flex; flex-direction: column; gap: 0; flex: 1; min-height: 0; }
    .flow-step { display: flex; align-items: stretch; gap: 10px; position: relative; }
    .flow-step:not(:last-child) { padding-bottom: 6px; }
    .flow-step-rail { display: flex; flex-direction: column; align-items: center; width: 28px; flex-shrink: 0; }
    .flow-step-num { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; }
    .flow-step-line { flex: 1; width: 2px; background: linear-gradient(180deg, var(--step-color, var(--s3)), transparent); margin: 4px 0; min-height: 8px; }
    .flow-step-body { flex: 1; padding: 6px 10px; border-radius: 10px; background: var(--s2); border: 1px solid var(--line); font-size: 11px; font-weight: 500; line-height: 1.4; display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
    .flow-step-body .icon { width: 14px; height: 14px; opacity: .65; flex-shrink: 0; }

    .tools-panel { background: var(--glass); border: 1px solid var(--line); border-radius: 12px; padding: 10px; flex-shrink: 0; display: flex; flex-direction: column; }
    .tools-panel-label { display: flex; align-items: center; gap: 6px; font-size: 9px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; flex-shrink: 0; }
    .tools-panel-label .icon { width: 12px; height: 12px; }
    .tool-tabs { display: flex; flex-direction: column; gap: 5px; min-height: 0; }
    .tool-tab {
      position: relative; min-height: 38px; width: 100%;
      display: flex; align-items: center; gap: 9px; padding: 8px 10px 8px 12px;
      border: 1px solid var(--line); border-radius: 12px; background: var(--s2);
      color: var(--muted); font: inherit; font-size: 11px; font-weight: 700;
      cursor: pointer; text-align: left; transition: all .2s;
    }
    .tool-tab:hover { color: var(--text); border-color: rgba(148,163,184,.3); transform: translateX(2px); }
    .tool-tab.active {
      color: var(--tool-color, var(--accent2));
      border-color: color-mix(in srgb, var(--tool-color, var(--accent2)) 45%, transparent);
      background: color-mix(in srgb, var(--tool-color, var(--accent2)) 14%, transparent);
      box-shadow: 0 4px 16px rgba(15,23,42,.2);
    }
    .tool-tab.active::before {
      content: ''; position: absolute; left: 0; top: 9px; bottom: 9px; width: 3px;
      border-radius: 0 3px 3px 0; background: var(--tool-color, var(--accent2));
    }
    .tool-tab-num { width: 20px; height: 20px; border-radius: 7px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; background: rgba(255,255,255,.05); border: 1px solid var(--line); font-size: 9px; font-weight: 800; }
    .tool-tab.active .tool-tab-num { background: var(--tool-color, var(--accent2)); color: #0f172a; border-color: transparent; }
    .tool-tab .icon { width: 13px; height: 13px; opacity: .75; flex-shrink: 0; }

    /* Win cards — department examples */
    .wins-shell { display: flex; flex-direction: column; flex: 1; min-height: 0; }
    .wins-body { display: grid; grid-template-columns: 172px 1fr; gap: 10px; flex: 1; min-height: 0; }
    .dept-tab .v-tab-sub { max-width: 120px; }
    .wins-main { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 10px; overflow: hidden; }

    .copilot-shell, .learn-shell, .dev-shell, .map-shell { display: flex; flex-direction: column; flex: 1; min-height: 0; }
    .dept-hero {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      background: var(--glass); backdrop-filter: blur(12px);
      border: 1px solid var(--line); border-radius: 14px; flex-shrink: 0;
      border-left: 4px solid var(--dept-color, var(--accent));
    }
    .dept-hero-ico { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .dept-hero-ico .icon { width: 22px; height: 22px; }
    .dept-hero-name { font-size: 15px; font-weight: 800; line-height: 1.2; }
    .dept-hero-tag { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.35; }
    .dept-hero-count { margin-left: auto; font-size: 9px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 5px 10px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); flex-shrink: 0; white-space: nowrap; }
    .win-examples-grid { display: grid; gap: 10px; flex: 1; min-height: 0; height: 100%; align-items: stretch; align-content: stretch; overflow-y: auto; }
    .win-examples-grid::-webkit-scrollbar { width: 4px; }
    .win-examples-grid::-webkit-scrollbar-thumb { background: var(--s3); border-radius: 2px; }
    .win-example-card {
      background: var(--glass); backdrop-filter: blur(12px);
      border: 1px solid var(--line); border-radius: 16px; padding: 14px;
      display: flex; flex-direction: column; gap: 10px; height: 100%; min-height: 0;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      position: relative; overflow: hidden;
    }
    .win-example-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--card-color, var(--accent));
    }
    .win-example-card:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,.22); border-color: rgba(148,163,184,.22); }
    .wec-brain { display: inline-flex; align-items: center; gap: 6px; font-size: 9px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
    .wec-brain .icon { width: 12px; height: 12px; }
    .wec-brain-ico { width: 24px; height: 24px; border-radius: 7px; display: inline-flex; align-items: center; justify-content: center; }
    .wec-brain-ico .icon { width: 12px; height: 12px; }
    .wec-q { font-size: 13px; font-weight: 700; line-height: 1.4; display: flex; gap: 8px; align-items: flex-start; }
    .wec-q .icon { width: 15px; height: 15px; flex-shrink: 0; margin-top: 2px; opacity: .8; }
    .win-card-summary { display: grid; grid-template-columns: 1.1fr .9fr; gap: 8px; flex-shrink: 0; }
    .win-mini-panel {
      background: var(--s2); border: 1px solid var(--line); border-radius: 12px; padding: 10px 11px;
      display: flex; align-items: flex-start; gap: 8px; min-height: 62px;
    }
    .win-mini-panel .icon { width: 13px; height: 13px; flex-shrink: 0; margin-top: 2px; color: var(--card-color, var(--accent)); }
    .win-mini-panel strong { display: block; font-size: 10px; color: var(--text); margin-bottom: 3px; letter-spacing: .04em; text-transform: uppercase; }
    .win-mini-panel span:last-child { display: block; font-size: 10px; line-height: 1.35; color: var(--muted); }
    .win-flow-diagram {
      flex: 1; min-height: 170px; display: grid; grid-template-columns: repeat(var(--flow-count, 4), minmax(0, 1fr));
      align-items: center; gap: 8px; padding: 14px 10px; border-radius: 14px;
      background: linear-gradient(135deg, rgba(15,23,42,.72), rgba(30,41,59,.34));
      border: 1px solid var(--line); position: relative; overflow: hidden;
    }
    .win-flow-diagram::before {
      content: ''; position: absolute; left: 10px; right: 10px; top: 50%; height: 2px;
      background: linear-gradient(90deg, var(--card-color, var(--accent)), transparent);
      opacity: .35;
    }
    .win-flow-node {
      position: relative; z-index: 1; min-width: 0; min-height: 118px; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; padding: 10px 8px; border-radius: 12px; text-align: center;
      background: rgba(15,23,42,.78); border: 1px solid rgba(148,163,184,.14);
    }

<div class="deck">
  <nav class="progress-rail" id="progressRail"></nav>
  <main class="stage" id="stage"></main>
  <div class="controls">
    <button class="btn" id="btnPrev"><i data-lucide="chevron-left"></i> Prev</button>
    <button class="btn" id="btnJump"><i data-lucide="layout-grid"></i> Slides</button>
    <button class="btn" id="btnAutoplay"><i data-lucide="play"></i> Autoplay</button>
    <span class="counter" id="counter">1 / 9</span>
    <button class="btn primary" id="btnNext">Next <i data-lucide="chevron-right"></i></button>
  </div>
</div>
<div class="jump-overlay" id="jumpOverlay">
  <div class="jump-grid-modal" id="jumpGridModal"></div>
</div>
<script>
  mermaid.initialize({
    startOnLoad: false, theme: 'dark',
    themeVariables: {
      primaryColor: '#1f2937', primaryTextColor: '#f9fafb',
      primaryBorderColor: '#6366f1', lineColor: '#6b7280',
      fontFamily: '"Inter",system-ui,sans-serif', fontSize: '13px',
      background: '#111827', mainBkg: '#1f2937',
    },
    flowchart: { curve: 'basis', padding: 10 },
    sequence: { actorMargin: 38, messageMargin: 18 },
  });

  let _mSeq = 0;
  async function renderMermaid(el, src, opts) {
    if (!el || !src) return;
    opts = opts || {};
    const id = 'mmd' + (++_mSeq);
    el.innerHTML = '';
    if (opts.label) {
      const h = document.createElement('div');
      h.className = 'diagram-head';
      h.innerHTML = ico('workflow') + opts.label;
      el.appendChild(h);
    }
    const host = document.createElement('div');

        svg.style.width = '100%';
        svg.style.height = '100%';

    svg.querySelectorAll('text,tspan').forEach(function(textNode) {
      const label = textNode.textContent.trim();
      const color = labelColors[label];
      if (!color) return;
      const group = textNode.closest('g');
      if (!group) return;
      textNode.style.fill = '#f8fafc';
      textNode.style.fontWeight = '700';
      const shape = group.querySelector('rect, polygon, ellipse');
      if (shape) {
        shape.style.fill = color;
        shape.style.stroke = color;
        shape.style.fillOpacity = '0.85';
        return;
      }
      const path = group.querySelector('path');
      if (path) {
        path.style.fill = color;
        path.style.stroke = color;
        path.style.fillOpacity = '0.85';
      }
    });

        el.querySelectorAll('.copilot-surface-tab').forEach(function(tab) {
          tab.addEventListener('click', function() { copilotStep = +tab.dataset.copilot; renderSlide(cur); });
        });
      });
    },
    el => {
      return renderMermaid(el.querySelector('#learnDiag'), LEARN_LOOP).then(function() {
        el.querySelectorAll('.learn-scenario-tab').forEach(p => {
          p.addEventListener('click', () => { learnSc = +p.dataset.sc; renderSlide(cur); });
        });
      });
    },
    el => {
      el.querySelectorAll('.dept-tab').forEach(function(btn) {
        btn.addEventListener('click', function() { winDept = btn.dataset.dept; renderSlide(cur); });
      });
    },
    el => {
      el.querySelectorAll('.dev-cat-tab').forEach(function(p) {
        p.addEventListener('click', function() { devCat = p.dataset.cat; renderSlide(cur); });
      });
    },
    null
  ];

  // ─── Render engine ───────────────────────────────────────────────────────
  async function renderSlide(idx) {
    const stage = document.getElementById('stage');
    [...stage.querySelectorAll('.slide')].forEach(el => el.remove());
    const slide = document.createElement('div');
    slide.className = 'slide active';
    slide.innerHTML = SLIDES[idx]();
    stage.appendChild(slide);
    refreshIcons(slide);
    if (SETUP[idx]) await SETUP[idx](slide);
    document.querySelectorAll('.p-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
    document.getElementById('counter').textContent = `${idx + 1} / ${SLIDE_META.length}`;
    document.querySelectorAll('.jump-tile').forEach((t, i) => t.classList.toggle('cur', i === idx));
  }

  // ─── Navigation ──────────────────────────────────────────────────────────
  function goTo(idx) {
    if (idx < 0 || idx >= SLIDE_META.length) return;
    cur = idx;
    renderSlide(idx);
  }
  const next = () => goTo(Math.min(cur + 1, SLIDE_META.length - 1));
  const prev = () => goTo(Math.max(cur - 1, 0));

  function toggleAutoplay() {
    const btn = document.getElementById('btnAutoplay');
    if (autoTimer) {
      clearInterval(autoTimer); autoTimer = null;
      btn.innerHTML = ico('play') + ' Autoplay'; btn.className = 'btn';
      refreshIcons(btn);
    } else {
      autoTimer = setInterval(() => {
        if (cur >= SLIDE_META.length - 1) {
          clearInterval(autoTimer); autoTimer = null;
          btn.innerHTML = ico('play') + ' Autoplay'; btn.className = 'btn';
          refreshIcons(btn);
        } else { next(); }
      }, 9000);
      btn.innerHTML = ico('pause') + ' Pause'; btn.className = 'btn playing';
      refreshIcons(btn);
    }
  }

  // ─── Init ────────────────────────────────────────────────────────────────
  const rail = document.getElementById('progressRail');
  const jgrid = document.getElementById('jumpGridModal');
  SLIDE_META.forEach((m, i) => {
    const dot = document.createElement('div');
    dot.className = 'p-dot' + (i === 0 ? ' active' : '');
    dot.title = m.label;
    dot.addEventListener('click', () => goTo(i));
    rail.appendChild(dot);
    if (i < SLIDE_META.length - 1) { const sep = document.createElement('div'); sep.className = 'p-sep'; rail.appendChild(sep); }

    const tile = document.createElement('div');
    tile.className = 'jump-tile' + (i === 0 ? ' cur' : '');
    tile.innerHTML = `<div class="jn">${i + 1}</div><div class="jl">${m.label}</div>`;
    tile.addEventListener('click', () => { goTo(i); document.getElementById('jumpOverlay').classList.remove('open'); });
    jgrid.appendChild(tile);
  });

  goTo(0);
  refreshIcons(document);

  document.getElementById('btnPrev').addEventListener('click', prev);
  document.getElementById('btnNext').addEventListener('click', next);
  document.getElementById('btnAutoplay').addEventListener('click', toggleAutoplay);
  document.getElementById('btnJump').addEventListener('click', () => document.getElementById('jumpOverlay').classList.toggle('open'));
  document.getElementById('jumpOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('open'); });
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next();
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prev();
    if (e.key === 'Escape') document.getElementById('jumpOverlay').classList.remove('open');
  });
</script>
</body>
</html>
