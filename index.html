<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <title>Aura by PRM — AI Intelligence Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    /* ── Reset & tokens ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #040b16;
      --surface: #0b1424;
      --s2: #121e33;
      --s3: #1c2d47;
      --text: #f0f6ff;
      --muted: #7a93b4;
      --line: rgba(100,140,200,.12);
      --accent: #6d7dfc;
      --accent2: #a5b4ff;
      --glow: rgba(109,125,252,.22);
      --glass: rgba(11,20,36,.78);
      --gold: #fbbf24;
      --teal: #2dd4bf;
      --rose: #fb7185;
      --green: #34d399;
      --orange: #fb923c;
      --sky: #60a5fa;
      --purple: #c084fc;
    }
    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* ── Ambient background canvas ──────────────────────────────────────────── */
    #bgCanvas { position: fixed; inset: 0; z-index: 0; opacity: .45; pointer-events: none; }
    body::after {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 60% 55% at 10% -5%, rgba(109,125,252,.18), transparent 50%),
        radial-gradient(ellipse 50% 45% at 95% 100%, rgba(45,212,191,.1), transparent 50%),
        radial-gradient(ellipse 40% 35% at 50% 50%, rgba(109,125,252,.05), transparent 60%),
        linear-gradient(rgba(100,140,200,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100,140,200,.025) 1px, transparent 1px);
      background-size: auto, auto, auto, 56px 56px, 56px 56px;
    }

    /* ── Deck layout ────────────────────────────────────────────────────────── */
    .deck { display: flex; flex-direction: column; height: 100dvh; position: relative; z-index: 1; }
    .icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .icon svg { width: 100%; height: 100%; stroke-width: 2; }

    /* ── Progress rail ──────────────────────────────────────────────────────── */
    .progress-rail { display: flex; align-items: center; gap: 5px; padding: 8px 24px; background: var(--glass); backdrop-filter: blur(20px); border-bottom: 1px solid var(--line); overflow-x: auto; flex-shrink: 0; }
    .progress-rail::-webkit-scrollbar { display: none; }
    .p-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--s3); cursor: pointer; flex-shrink: 0; transition: all .35s cubic-bezier(.4,0,.2,1); }
    .p-dot.active { background: linear-gradient(135deg,var(--accent),#818cf8); width: 28px; border-radius: 5px; box-shadow: 0 0 14px rgba(109,125,252,.5); }
    .p-sep { width: 6px; height: 1px; background: var(--s3); flex-shrink: 0; opacity: .4; }

    /* ── Stage & slides ─────────────────────────────────────────────────────── */
    .stage { flex: 1; position: relative; overflow: hidden; min-height: 0; }
    .slide { position: absolute; inset: 0; padding: 12px 28px 10px; opacity: 0; transform: translateX(40px); pointer-events: none; transition: opacity .4s ease, transform .4s cubic-bezier(.4,0,.2,1); overflow: hidden; display: flex; flex-direction: column; gap: 0; }
    .slide.active { opacity: 1; transform: translateX(0); pointer-events: auto; }
    .slide.prev-out { opacity: 0; transform: translateX(-40px); }

    /* ── Controls ───────────────────────────────────────────────────────────── */
    .controls { display: flex; align-items: center; gap: 8px; padding: 8px 24px; background: var(--glass); backdrop-filter: blur(20px); border-top: 1px solid var(--line); flex-shrink: 0; }
    .counter { font-size: 12px; color: var(--muted); flex: 1; text-align: center; font-variant-numeric: tabular-nums; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 12px; border: 1px solid var(--s3); background: var(--s2); color: var(--text); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; white-space: nowrap; font-family: inherit; }
    .btn:hover { background: var(--s3); border-color: rgba(109,125,252,.4); transform: translateY(-1px); }
    .btn.primary { background: linear-gradient(135deg,#6d7dfc,#4f46e5); border-color: transparent; color: white; box-shadow: 0 4px 16px rgba(109,125,252,.35); }
    .btn.primary:hover { background: linear-gradient(135deg,#4f46e5,#3730a3); }
    .btn.playing { background: linear-gradient(135deg,#065f46,#047857); border-color: #059669; color: #d1fae5; }

    /* ── Typography ─────────────────────────────────────────────────────────── */
    .slide-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; flex-shrink: 0; }
    .slide-header-left { flex: 1; min-width: 0; }
    .eyebrow { display: inline-flex; align-items: center; gap: 5px; font-size: 9.5px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--accent2); margin-bottom: 4px; padding: 3px 9px; border-radius: 999px; background: rgba(109,125,252,.12); border: 1px solid rgba(109,125,252,.22); }
    .slide-h1 { font-size: clamp(18px, 2.6vw, 30px); font-weight: 900; line-height: 1.1; margin-bottom: 0; letter-spacing: -.03em; }
    .slide-sub { font-size: 12px; color: var(--muted); margin-bottom: 8px; line-height: 1.5; max-width: 900px; flex-shrink: 0; }
    .fill { flex: 1; min-height: 0; }
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .g3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
    .g4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }

    /* ── Cards ──────────────────────────────────────────────────────────────── */
    .card { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--line); border-radius: 16px; padding: 16px; transition: border-color .2s, box-shadow .25s, transform .25s; }
    .card:hover { border-color: rgba(109,125,252,.3); box-shadow: 0 8px 32px rgba(0,0,0,.25), 0 0 0 1px rgba(109,125,252,.1); transform: translateY(-2px); }
    .card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .card-icon { width: 36px; height: 36px; border-radius: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card-icon .icon { width: 18px; height: 18px; }
    .card h3 { font-size: 13px; font-weight: 700; }
    .card p { font-size: 11.5px; color: var(--muted); line-height: 1.5; }
    .tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 600; }

    /* ── Entrance animations ────────────────────────────────────────────────── */
    @keyframes fadeUp { from { opacity:0; transform:translateY(22px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes scaleIn { from { opacity:0; transform:scale(.88); } to { opacity:1; transform:scale(1); } }
    @keyframes slideRight { from { opacity:0; transform:translateX(-24px); } to { opacity:1; transform:translateX(0); } }
    @keyframes slideLeft { from { opacity:0; transform:translateX(24px); } to { opacity:1; transform:translateX(0); } }
    @keyframes glowPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(109,125,252,0); } 50% { box-shadow: 0 0 32px 8px rgba(109,125,252,.28); } }
    @keyframes orbitSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes countUp { from { opacity:0; transform:scale(.5); } to { opacity:1; transform:scale(1); } }
    @keyframes borderGlow { 0%,100% { border-color: var(--line); } 50% { border-color: rgba(109,125,252,.5); } }
    @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
    @keyframes shimmer { from { background-position:-200% 0; } to { background-position:200% 0; } }
    @keyframes ping { 0% { transform:scale(1); opacity:1; } 100% { transform:scale(2.2); opacity:0; } }
    @keyframes typewriter { from { width:0; } to { width:100%; } }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }

    .anim-d1 { animation-delay: .05s; }
    .anim-d2 { animation-delay: .15s; }
    .anim-d3 { animation-delay: .25s; }
    .anim-d4 { animation-delay: .38s; }
    .anim-d5 { animation-delay: .5s; }
    .anim-d6 { animation-delay: .65s; }
    .anim-d7 { animation-delay: .8s; }
    .anim-d8 { animation-delay: .95s; }

    .slide.active .anim-up { animation: fadeUp .55s cubic-bezier(.22,1,.36,1) both; }
    .slide.active .anim-in { animation: fadeIn .5s ease both; }
    .slide.active .anim-scale { animation: scaleIn .5s cubic-bezier(.22,1,.36,1) both; }
    .slide.active .anim-right { animation: slideRight .5s cubic-bezier(.22,1,.36,1) both; }
    .slide.active .anim-left { animation: slideLeft .5s cubic-bezier(.22,1,.36,1) both; }

    /* ── Jump grid ──────────────────────────────────────────────────────────── */
    .jump-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(4,11,22,.88); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; padding: 24px; opacity: 0; pointer-events: none; transition: opacity .25s; }
    .jump-overlay.open { opacity: 1; pointer-events: auto; }
    .jump-grid-modal { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; max-width: 700px; width: 100%; max-height: 80vh; overflow-y: auto; }
    .jump-tile { background: var(--s2); border: 1px solid var(--line); border-radius: 14px; padding: 12px; cursor: pointer; transition: all .2s; }
    .jump-tile:hover, .jump-tile.cur { border-color: var(--accent); background: rgba(109,125,252,.12); }
    .jn { font-size: 20px; font-weight: 900; color: var(--accent2); }
    .jl { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── Title slide ────────────────────────────────────────────────────────── */
    .title-slide { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; flex: 1; gap: 0; padding: 0 24px; position: relative; overflow: hidden; }
    .title-brand { font-size: clamp(52px,8vw,100px); font-weight: 900; letter-spacing: -.05em; line-height: .95;
      background: linear-gradient(135deg, #a5b4ff 0%, #6d7dfc 35%, #2dd4bf 70%, #a5b4ff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: shimmer 4s linear infinite; }
    .title-byline { font-size: clamp(11px,1.4vw,16px); font-weight: 600; color: var(--muted); letter-spacing: .18em; text-transform: uppercase; margin-top: 6px; margin-bottom: 20px; }
    .title-tagline { font-size: clamp(14px,1.8vw,20px); color: var(--text); font-weight: 300; max-width: 640px; line-height: 1.55; margin-bottom: 28px; }
    .title-tagline strong { color: var(--accent2); font-weight: 700; }
    .stat-row { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-bottom: 24px; }
    .stat-chip { display: flex; flex-direction: column; align-items: center; gap: 2px; background: rgba(109,125,252,.1); border: 1px solid rgba(109,125,252,.2); border-radius: 14px; padding: 12px 20px; min-width: 90px; }
    .stat-n { font-size: 28px; font-weight: 900; color: var(--accent2); line-height: 1; }
    .stat-l { font-size: 10px; color: var(--muted); font-weight: 600; text-align: center; margin-top: 2px; }
    .title-hint { font-size: 10px; color: var(--muted); letter-spacing: .06em; }
    .title-orbit { position: absolute; width: 540px; height: 540px; border: 1px solid rgba(109,125,252,.08); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%,-50%); animation: orbitSpin 40s linear infinite; pointer-events: none; }
    .title-orbit2 { position: absolute; width: 780px; height: 780px; border: 1px dashed rgba(45,212,191,.05); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%,-50%); animation: orbitSpin 60s linear infinite reverse; pointer-events: none; }
    .orbit-dot { position: absolute; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); top: -4px; left: calc(50% - 4px); box-shadow: 0 0 10px 3px var(--glow); }
    .orbit-dot2 { background: var(--teal); box-shadow: 0 0 10px 3px rgba(45,212,191,.35); top: 50%; right: -4px; left: auto; }

    /* ── Possibility storm ──────────────────────────────────────────────────── */
    .storm-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; flex: 1; min-height: 0; overflow: hidden; }
    .storm-card { border-radius: 14px; padding: 12px 14px; border: 1px solid var(--line); background: var(--glass); display: flex; flex-direction: column; gap: 6px; cursor: default; position: relative; overflow: hidden; transition: border-color .25s, box-shadow .25s; }
    .storm-card::before { content:''; position:absolute; inset:0; background: linear-gradient(135deg, var(--c1,rgba(109,125,252,.08)), transparent 70%); pointer-events:none; }
    .storm-card:hover { border-color: var(--c2, rgba(109,125,252,.4)); box-shadow: 0 0 24px var(--c1,rgba(109,125,252,.12)); }
    .storm-ico { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-bottom: 2px; }
    .storm-ico .icon { width: 17px; height: 17px; }
    .storm-label { font-size: 12px; font-weight: 700; line-height: 1.25; }
    .storm-desc { font-size: 10.5px; color: var(--muted); line-height: 1.4; }
    .storm-tag { align-self: flex-start; background: rgba(109,125,252,.1); border: 1px solid rgba(109,125,252,.2); color: var(--accent2); font-size: 9px; font-weight: 700; letter-spacing: .08em; padding: 2px 7px; border-radius: 999px; text-transform: uppercase; }

    /* ── Platform map ───────────────────────────────────────────────────────── */
    .map-shell { display: flex; flex-direction: column; flex: 1; min-height: 0; gap: 10px; }
    .map-center { display: flex; align-items: center; justify-content: center; position: relative; flex: 1; min-height: 0; }
    .map-core { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg,#4f46e5,#2dd4bf); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; box-shadow: 0 0 0 16px rgba(109,125,252,.08), 0 0 0 32px rgba(109,125,252,.04); animation: glowPulse 3s ease-in-out infinite; z-index: 2; flex-shrink: 0; gap: 4px; }
    .map-core .icon { width: 30px; height: 30px; color: #fff; }
    .map-core-lbl { font-size: 10px; font-weight: 800; color: #fff; letter-spacing: .04em; text-transform: uppercase; line-height: 1.2; }
    .map-rings { position: absolute; inset: 0; }
    .map-ring { position: absolute; border-radius: 50%; border: 1px solid rgba(109,125,252,.08); top: 50%; left: 50%; }
    .map-assistants { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; flex-shrink: 0; }
    .asst-chip { border-radius: 14px; border: 1px solid var(--line); background: var(--glass); padding: 10px 12px; display: flex; align-items: center; gap: 9px; transition: all .25s; }
    .asst-chip:hover { border-color: rgba(109,125,252,.3); transform: translateY(-2px); }
    .asst-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .asst-name { font-size: 11.5px; font-weight: 700; }
    .asst-role { font-size: 10px; color: var(--muted); }

    /* ── Use case tabs ──────────────────────────────────────────────────────── */
    .use-shell { display: flex; flex-direction: column; flex: 1; min-height: 0; gap: 8px; }
    .use-tabs { display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }
    .use-tab { padding: 6px 14px; border-radius: 10px; border: 1px solid var(--line); background: var(--s2); font-size: 11.5px; font-weight: 600; cursor: pointer; transition: all .2s; color: var(--muted); }
    .use-tab.active { background: var(--accent); border-color: transparent; color: #fff; box-shadow: 0 4px 12px rgba(109,125,252,.35); }
    .use-body { flex: 1; min-height: 0; display: grid; grid-template-columns: 2fr 1fr; gap: 12px; }
    .use-flow { background: var(--glass); border: 1px solid var(--line); border-radius: 16px; padding: 16px; overflow-y: auto; }
    .use-meta { display: flex; flex-direction: column; gap: 10px; }
    .flow-step { display: flex; gap: 12px; margin-bottom: 12px; }
    .flow-num { width: 28px; height: 28px; border-radius: 50%; background: rgba(109,125,252,.15); border: 1px solid rgba(109,125,252,.3); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: var(--accent2); flex-shrink: 0; }
    .flow-connector { width: 2px; background: linear-gradient(to bottom, rgba(109,125,252,.3), transparent); margin: 0 auto; min-height: 16px; }
    .flow-body { flex: 1; }
    .flow-label { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
    .flow-detail { font-size: 11px; color: var(--muted); line-height: 1.4; }
    .meta-card { background: var(--glass); border: 1px solid var(--line); border-radius: 14px; padding: 12px; }
    .meta-title { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }

    /* ── Governance slide ───────────────────────────────────────────────────── */
    .gov-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; flex: 1; min-height: 0; }
    .gov-flow { background: var(--glass); border: 1px solid var(--line); border-radius: 16px; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .gov-step { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: 12px; border: 1px solid var(--line); background: rgba(11,20,36,.5); }
    .gov-step-ico { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .gov-step-ico .icon { width: 16px; height: 16px; }
    .gov-step-label { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
    .gov-step-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }
    .gov-arrow { font-size: 18px; color: var(--accent2); align-self: center; text-align: center; margin: -4px 0; }
    .gov-pillars { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .gov-pillar { border-radius: 14px; border: 1px solid var(--line); background: var(--glass); padding: 14px 16px; }
    .gov-pillar-label { font-size: 13px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
    .gov-pillar p { font-size: 11px; color: var(--muted); line-height: 1.45; }

    /* ── Security slide ─────────────────────────────────────────────────────── */
    .sec-grid { display: grid; grid-template-columns: 1fr 1.3fr; gap: 12px; flex: 1; min-height: 0; }
    .seg-visual { background: var(--glass); border: 1px solid var(--line); border-radius: 16px; padding: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; position: relative; overflow: hidden; }
    .seg-core { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg,#4f46e5,#2dd4bf); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 0 12px rgba(109,125,252,.08), 0 0 0 24px rgba(109,125,252,.04); z-index: 2; position: relative; }
    .seg-core .icon { width: 28px; height: 28px; color: #fff; }
    .seg-ring { position: absolute; inset: 0; pointer-events: none; }
    .seg-dept { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; z-index: 2; }
    .seg-chip { padding: 5px 12px; border-radius: 999px; border: 1px solid; font-size: 10.5px; font-weight: 700; display: flex; align-items: center; gap: 5px; }
    .seg-chip .icon { width: 12px; height: 12px; }
    .sec-pillars { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
    .sec-pillar { border-radius: 14px; border: 1px solid var(--line); background: var(--glass); padding: 13px 16px; display: flex; gap: 12px; align-items: flex-start; }
    .sec-pillar-ico { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .sec-pillar-ico .icon { width: 18px; height: 18px; }
    .sec-pillar-body h4 { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
    .sec-pillar-body p { font-size: 11px; color: var(--muted); line-height: 1.45; }

    /* ── Meeting participant ─────────────────────────────────────────────────── */
    .meet-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 12px; flex: 1; min-height: 0; }
    .zoom-mock { background: #1a1a2e; border: 1px solid #2d2d50; border-radius: 16px; padding: 14px; display: flex; flex-direction: column; gap: 8px; overflow: hidden; }
    .zoom-bar { background: #0d0d1f; border-radius: 8px; padding: 7px 12px; display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 600; }
    .zoom-dot { width: 8px; height: 8px; border-radius: 50%; }
    .zoom-participants { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; flex: 1; }
    .zoom-p { border-radius: 10px; background: #0f1029; border: 1px solid #252550; padding: 10px 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; aspect-ratio: 16/10; font-size: 10.5px; font-weight: 700; position: relative; text-align: center; }
    .zoom-p.aura { background: linear-gradient(135deg, #0f172a, #1a1040); border-color: var(--accent); box-shadow: 0 0 0 2px rgba(109,125,252,.2); animation: borderGlow 2.5s ease-in-out infinite; }
    .zoom-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; }
    .zoom-hand { position: absolute; top: 4px; right: 4px; background: var(--gold); border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 10px; animation: float 1.5s ease-in-out infinite; }
    .zoom-insight { background: rgba(109,125,252,.12); border: 1px solid rgba(109,125,252,.25); border-radius: 12px; padding: 10px 12px; margin-top: 4px; }

/* ── Ambient particle canvas ─────────────────────────────────────────────── */
(function () {
  var canvas = document.getElementById('bgCanvas');
  var ctx = canvas.getContext('2d');
  var W, H, particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for (var i = 0; i < 60; i++) {
    particles.push({ x: Math.random()*2000, y: Math.random()*1200, r: Math.random()*1.5+.3, vx: (Math.random()-.5)*.18, vy: (Math.random()-.5)*.18, a: Math.random()*.6+.1 });
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    particles.forEach(function(p) {
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = 'rgba(109,125,252,'+p.a+')'; ctx.fill();
      p.x += p.vx; p.y += p.vy;
      if (p.x<0||p.x>W) p.vx*=-1;
      if (p.y<0||p.y>H) p.vy*=-1;
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

  return `
    <div class="slide-header anim-up anim-d1">
      <div class="slide-header-left">
        <p class="eyebrow">${ico('users')} Collaboration</p>
        <h1 class="slide-h1">Your Whole Organisation, Coordinated.</h1>
      </div>
    </div>
    <p class="slide-sub anim-up anim-d2">Aura doesn't just answer questions — it runs the coordination layer that keeps your team aligned, informed, and moving fast.</p>
    <div class="g3 fill">
      ${workflows.map(function(w,i){ return `
        <div class="card anim-up anim-d${Math.min(i+2,8)}">
          <div class="card-head">
            <div class="card-icon" style="background:rgba(109,125,252,.1)">${ico(w.ico,18)}</div>
            <h3 style="color:${w.color}">${w.label}</h3>
          </div>
          <p>${w.desc}</p>
        </div>`; }).join('')}
    </div>`;
}

        <div class="val-label">Organisations using Aura trace 6 times more decisions than those relying on email and manual notes — dramatically reducing repeat work and risk.</div>
        <div class="val-items">

/* ── Slide 13 — Closing ──────────────────────────────────────────────────── */
function slideClosing() {
  return `
    <div class="closing-slide fill">
      <div class="title-orbit" style="opacity:.4"><div class="orbit-dot"></div></div>
      <p class="eyebrow anim-up anim-d1">${ico('zap')} PRM Intelligence Platform</p>
      <h1 class="closing-brand anim-up anim-d2">${BRAND.name}</h1>
      <p class="closing-tagline anim-up anim-d3">The first AI platform built for <strong style="color:var(--accent2)">how your organisation actually works</strong> — not a generic tool bolted onto your process.</p>
      <div class="closing-pills anim-up anim-d4">
        ${['Joins your meetings','Writes your documents','Traces every decision','Learns your standards','Secures your IP','Compounds forever'].map(function(p){ return `<div class="closing-pill">${ico('check',13)} ${p}</div>`; }).join('')}
      </div>
      <p class="closing-cta anim-in anim-d6">Ready to deploy · <strong>PRM-Billing/aibrain</strong></p>
    </div>`;

/* ── SLIDE registry ──────────────────────────────────────────────────────── */
var SLIDES = [
  slideTitle,
  slidePossible,
  slideMap,
  slideUseCases,
  slideMeeting,
  slideGov,
  slideSecurity,
  slideMemory,
  slideDocs,
  slideIntel,
  slideLearning,
  slideCollab,
  slideROI,
  slideClosing,
];

/* ── SETUP hooks ─────────────────────────────────────────────────────────── */
var SETUP = SLIDES.map(function(_, i) {
  // Use case tabs need event wiring
  if (i === 3) return function(slide) {
    slide.querySelectorAll('.use-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        ucIdx = parseInt(tab.dataset.uc);
        renderSlide(3);
      });
    });
  };
  return null;
});

/* ── Render engine ───────────────────────────────────────────────────────── */
var cur = 0;
var autoTimer = null;

function renderSlide(idx) {
  var stage = document.getElementById('stage');
  var old = stage.querySelector('.slide');
  if (old) {
    old.classList.remove('active');
    old.classList.add('prev-out');
    setTimeout(function() { if (old.parentNode) old.parentNode.removeChild(old); }, 400);
  }
  var slide = document.createElement('div');
  slide.className = 'slide';
  slide.innerHTML = SLIDES[idx]();
  stage.appendChild(slide);
  requestAnimationFrame(function() {
    requestAnimationFrame(function() { slide.classList.add('active'); });
  });
  refreshIcons(slide);
  if (SETUP[idx]) SETUP[idx](slide);
  document.querySelectorAll('.p-dot').forEach(function(d, i) { d.classList.toggle('active', i === idx); });
  document.getElementById('counter').textContent = (idx + 1) + ' / ' + SLIDE_META.length;
  document.querySelectorAll('.jump-tile').forEach(function(t, i) { t.classList.toggle('cur', i === idx); });
}

function goTo(idx) {
  if (idx < 0 || idx >= SLIDE_META.length) return;
  cur = idx;
  renderSlide(idx);
}
var next = function() { goTo(Math.min(cur + 1, SLIDE_META.length - 1)); };
var prev = function() { goTo(Math.max(cur - 1, 0)); };

function toggleAutoplay() {
  var btn = document.getElementById('btnAutoplay');
  if (autoTimer) {
    clearInterval(autoTimer); autoTimer = null;
    btn.innerHTML = '<i data-lucide="play"></i> Autoplay'; btn.className = 'btn';
  } else {
    autoTimer = setInterval(function() {
      if (cur >= SLIDE_META.length - 1) {
        clearInterval(autoTimer); autoTimer = null;
        btn.innerHTML = '<i data-lucide="play"></i> Autoplay'; btn.className = 'btn';
      } else { next(); }
    }, 9000);
    btn.innerHTML = '<i data-lucide="pause"></i> Pause'; btn.className = 'btn playing';
  }
  refreshIcons(btn);
}

/* ── Init ────────────────────────────────────────────────────────────────── */
var rail = document.getElementById('progressRail');
var jgrid = document.getElementById('jumpGridModal');
SLIDE_META.forEach(function(m, i) {
  var dot = document.createElement('div');
  dot.className = 'p-dot' + (i === 0 ? ' active' : '');
  dot.title = m.label;
  dot.addEventListener('click', function() { goTo(i); });
  rail.appendChild(dot);
  if (i < SLIDE_META.length - 1) { var sep = document.createElement('div'); sep.className = 'p-sep'; rail.appendChild(sep); }

  var tile = document.createElement('div');
  tile.className = 'jump-tile' + (i === 0 ? ' cur' : '');
  tile.innerHTML = '<div class="jn">' + (i+1) + '</div><div class="jl">' + m.label + '</div>';
  tile.addEventListener('click', function() { goTo(i); document.getElementById('jumpOverlay').classList.remove('open'); });
  jgrid.appendChild(tile);
});

goTo(0);

document.getElementById('btnPrev').addEventListener('click', prev);
document.getElementById('btnNext').addEventListener('click', next);
document.getElementById('btnAutoplay').addEventListener('click', toggleAutoplay);
document.getElementById('btnJump').addEventListener('click', function() { document.getElementById('jumpOverlay').classList.toggle('open'); });
document.getElementById('jumpOverlay').addEventListener('click', function(e) { if (e.target === e.currentTarget) e.currentTarget.classList.remove('open'); });
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prev();
  if (e.key === 'Escape') document.getElementById('jumpOverlay').classList.remove('open');
  if (e.key === ' ') { e.preventDefault(); toggleAutoplay(); }
});
</script>
</body>
</html>
